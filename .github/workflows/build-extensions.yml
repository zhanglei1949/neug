name: Build Extensions

on:
  workflow_dispatch:
    inputs:
      extensions:
        description: 'Semicolon-separated list of extensions to build (e.g., json;parquet)'
        required: false
        default: 'json;parquet'
      version:
        description: 'Version tag for the extensions (e.g., 0.1.1)'
        required: false
        default: '0.1.1'
  push:
    branches:
      - main
    paths:
      - 'extension/**'
      - 'cmake/**'
      - 'src/**'
      - 'include/**'
      - 'CMakeLists.txt'
      - '.github/workflows/build-extensions.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'extension/**'
      - 'cmake/**'
      - 'src/**'
      - 'include/**'
      - 'CMakeLists.txt'
      - '.github/workflows/build-extensions.yml'

concurrency:
  group: ${{ github.repository }}-${{ github.event.number || github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  # Shared step to determine extensions and version
  prepare:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    outputs:
      extensions: ${{ steps.extensions.outputs.extensions }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Determine extensions to build
        id: extensions
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            EXTENSIONS="${{ github.event.inputs.extensions }}"
          else
            EXTENSIONS="json;parquet"
          fi
          echo "extensions=$EXTENSIONS" >> $GITHUB_OUTPUT
          echo "Building extensions: $EXTENSIONS"

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ -n "${{ github.ref }}" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            # Default to 0.1.1 if no version is specified
            VERSION="0.1.1"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

  # Linux x86_64
  build_linux_x86_64:
    needs: prepare
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: [self-hosted, X64]
    container:
      image: neug-registry.cn-hongkong.cr.aliyuncs.com/neug/neug-manylinux:v0.1.1-x86_64
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Mark directory safe
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/third_party/aliyun-oss-cpp-sdk"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/third_party/parallel-hashmap"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/third_party/pybind11"

      - name: Debug runner information
        run: |
          echo "Runner name: ${{ runner.name }}"
          echo "Runner OS: ${{ runner.os }}"
          echo "Runner architecture: ${{ runner.arch }}"
          echo "Workspace: ${{ runner.workspace }}"
          echo "Current user: $(whoami)"
          echo "Hostname: $(hostname)"
          echo "IP address: $(hostname -I)"

      - name: Clean the tool directory for self-hosted runner
        run: |
          rm -rf /__w/_tool/Python

      - name: Cache CCache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-ext-linux-x86_64-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-ext-linux-x86_64-
            ${{ runner.os }}-ccache-ext-

      - name: Setup CCache
        run: |
          sudo apt-get update && sudo apt-get install -y ccache
          ccache --max-size=2G
          ccache --zero-stats

      - name: Increase the maximum number of opened files
        run: |
          ulimit -n 65535
          sudo chmod -R 777 /etc/security/*
          echo "*   soft  nofile  1048576" | tee -a /etc/security/limits.conf

      - name: Clean the tool directory for self-hosted runner
        run: |
          rm -rf /__w/_tool/Python

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Build NeuG with extensions
        run: |
          . /home/neug/.neug_env
          cd ${GITHUB_WORKSPACE}/
          ./scripts/build_and_upload_extensions.sh \
            --platform linux_x86_64 \
            --version ${{ needs.prepare.outputs.version }} \
            --extensions ${{ needs.prepare.outputs.extensions }}

      - name: Upload extension packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-packages-linux-x86_64-${{ needs.prepare.outputs.version }}
          path: |
            /tmp/extension_packages/*.neug_extension
            /tmp/extension_packages/*.sha256
          retention-days: 1
          if-no-files-found: warn

  # Linux arm64
  build_linux_arm64:
    needs: prepare
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: [self-hosted, ARM64]
    container:
      image: neug-registry.cn-hongkong.cr.aliyuncs.com/neug/neug-manylinux:v0.1.1-arm64
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Mark directory safe
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/third_party/aliyun-oss-cpp-sdk"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/third_party/parallel-hashmap"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/third_party/pybind11"

      - name: Debug runner information
        run: |
          echo "Runner name: ${{ runner.name }}"
          echo "Runner OS: ${{ runner.os }}"
          echo "Runner architecture: ${{ runner.arch }}"
          echo "Workspace: ${{ runner.workspace }}"
          echo "Current user: $(whoami)"
          echo "Hostname: $(hostname)"
          echo "IP address: $(hostname -I)"
          echo "CPU architecture: $(uname -m)"

      - name: Clean the tool directory for self-hosted runner
        run: |
          rm -rf /__w/_tool/Python

      - name: Cache CCache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-ext-linux-arm64-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-ext-linux-arm64-
            ${{ runner.os }}-ccache-ext-

      - name: Setup CCache
        run: |
          sudo apt-get update && sudo apt-get install -y ccache
          ccache --max-size=2G
          ccache --zero-stats

      - name: Increase the maximum number of opened files
        run: |
          ulimit -n 65535
          sudo chmod -R 777 /etc/security/*
          echo "*   soft  nofile  1048576" | tee -a /etc/security/limits.conf

      - name: Clean the tool directory for self-hosted runner
        run: |
          rm -rf /__w/_tool/Python

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Build NeuG with extensions
        run: |
          . /home/neug/.neug_env
          cd ${GITHUB_WORKSPACE}
          ./scripts/build_and_upload_extensions.sh \
            --platform linux_arm64 \
            --version ${{ needs.prepare.outputs.version }} \
            --extensions ${{ needs.prepare.outputs.extensions }}

      - name: Upload extension packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-packages-linux-arm64-${{ needs.prepare.outputs.version }}
          path: |
            /tmp/extension_packages/*.neug_extension
            /tmp/extension_packages/*.sha256
          retention-days: 1
          if-no-files-found: warn

  # macOS x86_64
  build_macos_x86_64:
    needs: prepare
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: macos-13
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Clean the tool directory for self-hosted runner
        run: |
          rm -rf /__w/_tool/Python

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          bash scripts/install_deps.sh

      - name: Prepare for macOS
        run: |
          echo "MACOSX_DEPLOYMENT_TARGET=10.15" >> $GITHUB_ENV
          source ~/.neug_env
          echo "CMAKE_BUILD_PARALLEL_LEVEL=$(sysctl -n hw.ncpu)" >> $GITHUB_ENV

      - name: Build NeuG with extensions
        run: |
          source ~/.neug_env
          cd ${GITHUB_WORKSPACE}
          ./scripts/build_and_upload_extensions.sh \
            --platform osx_x86_64 \
            --version ${{ needs.prepare.outputs.version }} \
            --extensions ${{ needs.prepare.outputs.extensions }}

      - name: Upload extension packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-packages-osx-x86_64-${{ needs.prepare.outputs.version }}
          path: |
            /tmp/extension_packages/*.neug_extension
            /tmp/extension_packages/*.sha256
          retention-days: 1
          if-no-files-found: warn

  # macOS ARM64
  build_macos_arm64:
    needs: prepare
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: macos-14
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Clean the tool directory for self-hosted runner
        run: |
          rm -rf /__w/_tool/Python

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          bash scripts/install_deps.sh

      - name: Prepare for macOS
        run: |
          echo "MACOSX_DEPLOYMENT_TARGET=10.15" >> $GITHUB_ENV
          source ~/.neug_env
          echo "CMAKE_BUILD_PARALLEL_LEVEL=$(sysctl -n hw.ncpu)" >> $GITHUB_ENV

      - name: Build NeuG with extensions
        run: |
          source ~/.neug_env
          cd ${GITHUB_WORKSPACE}
          ./scripts/build_and_upload_extensions.sh \
            --platform osx_arm64 \
            --version ${{ needs.prepare.outputs.version }} \
            --extensions ${{ needs.prepare.outputs.extensions }}

      - name: Upload extension packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-packages-osx-arm64-${{ needs.prepare.outputs.version }}
          path: |
            /tmp/extension_packages/*.neug_extension
            /tmp/extension_packages/*.sha256
          retention-days: 1
          if-no-files-found: warn



