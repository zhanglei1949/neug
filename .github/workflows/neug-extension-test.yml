name: NeuG Extension Test

on:
  schedule:
    # Run at 08:00 UTC every Saturday
    - cron: '0 8 * * 6'
  workflow_dispatch:  # Manual trigger (must exist on default branch to see "Run workflow")
    inputs:
      branch:
        description: 'Branch to run the workflow on'
        required: true
        default: 'main'
        type: string
      rebuild_neug:
        description: 'Rebuild NeuG wheel package before testing extension'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.repository }}-${{ github.event.number || github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Job 1: Build NeuG with extensions
  # ============================================================
  extension_tests_default:
    runs-on: [self-hosted, linux]
    container:
      image: neug-registry.cn-hongkong.cr.aliyuncs.com/neug/neug-dev:v0.1.1
    steps:
    - name: checkout
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Mark directory safe
      run: |
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        git config --global --add safe.directory "$GITHUB_WORKSPACE/third_party/aliyun-oss-cpp-sdk"
        git config --global --add safe.directory "$GITHUB_WORKSPACE/third_party/parallel-hashmap"
        git config --global --add safe.directory "$GITHUB_WORKSPACE/third_party/pybind11"

    - name: Clean the tool directory for self-hosted runner
      run: |
        rm -rf /__w/_tool/Python

    - name: Cache CCache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ccache
        key: ${{ runner.os }}-ccache-ext-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-ccache-ext-
          ${{ runner.os }}-ccache-

    - name: Setup CCache
      run: |
        sudo apt-get update && sudo apt-get install -y ccache
        ccache --max-size=2G
        ccache --zero-stats

    - name: Increase the maximum number of opened files
      run: |
        ulimit -n 65535
        sudo chmod -R 777 /etc/security/*
        echo "*   soft  nofile  1048576" | tee -a /etc/security/limits.conf

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    # TODO: After unifying wheel build (neug-manylinux:v0.1.1-x86_64) and dev images (neug-dev:v0.1.1), 
    # skip the build process and use `pip3 install neug` to test the locally built json extension 
    # with the released wheel package.
    - name: Build NeuG with extensions
      run: |
        . /home/neug/.neug_env
        cd ${GITHUB_WORKSPACE}/
        export CI=ON # Mark CI environment to enable CI-specific settings(use system level arrow)
        export BUILD_TYPE=RELEASE
        export CMAKE_BUILD_PARALLEL_LEVEL=$(printf '%s\n' "$(nproc)" 32 | awk 'NR==1 || $0<min { min=$0 } END { print min }')
        export BUILD_EXECUTABLES=ON
        export BUILD_HTTP_SERVER=ON
        export BUILD_TEST=ON
        export USE_NINJA=OFF
        export WITH_MIMALLOC=OFF
        export CMAKE_INSTALL_PREFIX=/opt/neug-install/
        export BUILD_EXTENSIONS="json;parquet"
        sudo mkdir -p /opt/neug-install
        sudo chown -R $USER:$USER /opt/neug-install/
        export CC="ccache gcc"
        export CXX="ccache g++"
        cd tools/python_bind
        make clean
        make requirements
        make build
        ccache --show-stats

    - name: Run Extension C++ Test
      run: |
        cd ${GITHUB_WORKSPACE}/tools/python_bind/
        export MODERN_GRAPH_DATA_DIR=${GITHUB_WORKSPACE}/example_dataset/modern_graph
        export COMPREHENSIVE_GRAPH_DATA_DIR=${GITHUB_WORKSPACE}/example_dataset/comprehensive_graph
        export FLEX_DATA_DIR=${GITHUB_WORKSPACE}/example_dataset/modern_graph
        export TEST_PATH=${GITHUB_WORKSPACE}/tests
        cd build/neug_py_bind
        ctest -R json_extension_test -V
        ctest -R parquet_extension_test -V
        export FLEX_DATA_DIR=${GITHUB_WORKSPACE}/example_dataset/tinysnb
        ctest -R test_extension -V

    - name: Run Extension Python Test
      run: |
        cd ${GITHUB_WORKSPACE}/tools/python_bind/
        pip3 install -r requirements.txt
        pip3 install -r requirements_dev.txt
        export FLEX_DATA_DIR=${GITHUB_WORKSPACE}/example_dataset/tinysnb
        GLOG_v=10 ./build/neug_py_bind/tools/utils/bulk_loader -g ../../example_dataset/tinysnb/graph.yaml -l ../../example_dataset/tinysnb/import.yaml -d /tmp/tinysnb
        export FLEX_DATA_DIR=${GITHUB_WORKSPACE}/example_dataset/comprehensive_graph
        GLOG_v=10 ./build/neug_py_bind/tools/utils/bulk_loader -g ../../example_dataset/comprehensive_graph/graph.yaml -l ../../example_dataset/comprehensive_graph/import.yaml -d /tmp/comprehensive_graph
        NEUG_RUN_EXTENSION_TESTS=true python3 -m pytest -sv tests/test_load.py -k "json"
        NEUG_RUN_EXTENSION_TESTS=true python3 -m pytest -sv tests/test_export.py -k "json"
        NEUG_RUN_EXTENSION_TESTS=true python3 -m pytest -sv tests/test_load.py -k "parquet"

  extension_tests_wheel_linux_x86_64:
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: checkout
        id: checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup Python Env
        run: |
          USER_SITE=$(python3 -c "import site; print(site.getusersitepackages())")
          echo "USER_SITE=$USER_SITE" >> $GITHUB_ENV

      - name: Install cibuildwheel
        run: python3 -m pip install cibuildwheel==3.4.0

      - name: Prepare for linux
        run: |
          echo "CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)" >> $GITHUB_ENV

      - name: Limit builds to CPython 3.13 on PRs
        run: |
          echo "CIBW_SKIP=cp39-* cp38-* cp311-* cp312-* cp310-*" >> $GITHUB_ENV
          echo "CIBW_BUILD=cp313-manylinux_x86_64" >> $GITHUB_ENV

      - name: Build NeuG wheel
        if: inputs.rebuild_neug == true
        run: |
          export CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)
          export BUILD_TYPE=RELEASE
          export PYBIND11_FINDPYTHON=OFF
          python3 -m cibuildwheel ./tools/python_bind --output-dir wheelhouse

      - name: Build Extension Package
        run: |
          export CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)
          export BUILD_TYPE=RELEASE
          export PYBIND11_FINDPYTHON=OFF
          CI_INSTALL_EXTENSIONS="json;parquet" python3 -m cibuildwheel ./tools/python_bind --output-dir extension_packages

      - name: Clean all installed python packages
        run: |
          python3 -m pip freeze | xargs python3 -m pip uninstall -y || true

      - name: Install Wheel and extension
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip uninstall -y neug || echo "Uninstalled neug if it was installed"
          # install NeuG wheel
          if [ "${{ inputs.rebuild_neug }}" = "true" ]; then
            for i in wheelhouse/*.whl; do
              [ -f "$i" ] && python3 -m pip install "$i" || echo "Failed to install $i"
            done
          else
            python3 -m pip install neug
          fi
          # install Extension Package (extract first .whl when multiple exist)
          EXT_WHL=$(echo extension_packages/*.whl | awk '{print $1}')
          python3 -m zipfile -e "$EXT_WHL" extension_packages
          # get neug install directory (site-packages) and install extension there
          rm -rf $USER_SITE/extension
          cp -r extension_packages/extension $USER_SITE

      - name: Run simple and complex tests
        env:
          TMP_DIR: ${{ github.workspace }}/${{ github.run_id }}
        run: |
          rm -rf ${TMP_DIR}/test_example
          GLOG_v=10 python3 tools/python_bind/example/simple_example.py example_dataset/modern_graph ${TMP_DIR}/test_example
          NEUG_RUN_EXTENSION_TESTS=1 python3 tools/python_bind/example/complex_test.py

  extension_tests_wheel_linux_arm64:
    runs-on: [self-hosted, linux, arm64]
    steps:
      - name: checkout
        id: checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python 3.13
        if: runner.name != 'arm64-1'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
  
      - name: Setup Python Env
        run: |
          USER_SITE=$(python3 -c "import site; print(site.getusersitepackages())")
          echo "USER_SITE=$USER_SITE" >> $GITHUB_ENV
          echo "PYTHONPATH=$USER_SITE${PYTHONPATH:+:$PYTHONPATH}" >> $GITHUB_ENV

      - name: Install cibuildwheel
        run: python3 -m pip install cibuildwheel==3.4.0

      - name: Prepare for linux
        run: |
          echo "CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)" >> $GITHUB_ENV

      - name: Limit builds to CPython 3.13 on PRs
        run: |
          echo "CIBW_SKIP=cp39-* cp38-* cp311-* cp312-* cp310-*" >> $GITHUB_ENV
          echo "CIBW_BUILD=cp313-manylinux_aarch64" >> $GITHUB_ENV

      - name: Build NeuG wheel
        if: inputs.rebuild_neug == true
        run: |
          export CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)
          export BUILD_TYPE=RELEASE
          export PYBIND11_FINDPYTHON=OFF
          python3 -m cibuildwheel ./tools/python_bind --output-dir wheelhouse
      
      - name: Build Extension Package
        run: |
          export CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)
          export BUILD_TYPE=RELEASE
          export PYBIND11_FINDPYTHON=OFF
          CI_INSTALL_EXTENSIONS="json;parquet" python3 -m cibuildwheel ./tools/python_bind --output-dir extension_packages

      - name: Clean all installed python packages
        run: |
          python3 -m pip freeze | xargs python3 -m pip uninstall -y || true

      - name: Install Wheel and extension
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip uninstall -y neug || echo "Uninstalled neug if it was installed"
          # install NeuG wheel
          if [ "${{ inputs.rebuild_neug }}" = "true" ]; then
            for i in wheelhouse/*.whl; do
              [ -f "$i" ] && python3 -m pip install "$i" || echo "Failed to install $i"
            done
          else
            python3 -m pip install neug
          fi
          # install Extension Package (extract first .whl when multiple exist)
          EXT_WHL=$(echo extension_packages/*.whl | awk '{print $1}')
          python3 -m zipfile -e "$EXT_WHL" extension_packages
          # get neug install directory (site-packages) and install extension there
          rm -rf $USER_SITE/extension
          cp -r extension_packages/extension $USER_SITE

      - name: Run simple and complex tests
        env:
          TMP_DIR: ${{ github.workspace }}/${{ github.run_id }}
        run: |
          rm -rf ${TMP_DIR}/test_example
          GLOG_v=10 python3 tools/python_bind/example/simple_example.py example_dataset/modern_graph ${TMP_DIR}/test_example
          NEUG_RUN_EXTENSION_TESTS=1 python3 tools/python_bind/example/complex_test.py
