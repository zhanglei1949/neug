        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip uninstall -y neug || echo "Uninstalled neug if it was installed"
          for i in $(ls wheelhouse/*.whl); do
            python3 -m pip install $i || echo "Failed to install $i"
          done
          rm -rf ${TMP_DIR}/test_example
          GLOG_v=10 python3 tools/python_bind/example/simple_example.py example_dataset/modern_graph ${TMP_DIR}/test_example

      - name: Run NeuG-Cli test
        run: |
          neug-cli --help
          neug-cli --version

  test_wheels_macos_x86_64:
    needs: build_wheels_macos_x86_64
    # if: (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')))
      # && needs.build_wheels_macos_x86_64.result == 'success'
    if: needs.build_wheels_macos_x86_64.result == 'success'
    runs-on: macos-15-intel
    strategy:
      matrix:
        python-version: ['3.14']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: wheels-macos-x86_64-${{ github.run_id }}
          path: wheelhouse

      - name: Install wheel and run complex test
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip uninstall -y neug || true
          PY_VERSION="${{ matrix.python-version }}"
          PY_TAG="cp$(echo "$PY_VERSION" | tr -d '.')"
          TARGET=$(ls wheelhouse/*${PY_TAG}*.whl | head -n 1 || true)
          if [ -z "$TARGET" ]; then
            echo "No wheel found for tag ${PY_TAG}"
            ls -R wheelhouse
            exit 1
          fi
          echo "Installing $TARGET"
          python -m pip install "$TARGET"
          python tools/python_bind/example/complex_test.py

  test_wheels_macos_aarch64:
    needs: build_wheels_macos_aarch64
    # if: (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')))
      # && needs.build_wheels_macos_aarch64.result == 'success'
