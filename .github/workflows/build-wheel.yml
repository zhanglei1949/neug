name: Build Wheels

on:
  # Trigger the workflow on push or pull request,
  # but only for the main branch
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths: &wheel_paths
      - 'cmake/**'
      - 'src/**'
      - 'include/**'
      - 'proto/**'
      - 'third_party/**'
      - 'tools/python_bind/**'
      - 'tools/shell/**'
      - '.github/workflows/build-wheel.yml'
      - 'scripts/install_deps.sh'
      - 'CMakeLists.txt'
      - 'NEUG_VERSION'
  pull_request:
    branches:
      - main
    paths: *wheel_paths

concurrency:
  group: ${{ github.repository }}-${{ github.event.number || github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  format_check:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/format-check.yml
    with:
      is_pull_request: true

  build_wheels_linux_x86_64:
    needs: format_check
    runs-on: [self-hosted, linux, x64]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: checkout
        id: checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Clean the tool directory for self-hosted runner
        run: |
          rm -rf /__w/_tool/Python

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install cibuildwheel
        run: python3 -m pip install cibuildwheel==3.4.0

      - name: Prepare for linux
        run: |
          echo "CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)" >> $GITHUB_ENV

      - name: Limit builds to CPython 3.14 on PRs
        if: github.event_name == 'pull_request'
        run: echo "CIBW_BUILD=cp314-*" >> $GITHUB_ENV

      - name: Build wheels
        run: |
          export CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)
          export BUILD_TYPE=RELEASE
          export PYBIND11_FINDPYTHON=OFF
          python3 -m cibuildwheel ./tools/python_bind --output-dir wheelhouse

      - name: Upload wheel artifacts
        if: (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')))
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64-${{ github.run_id }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@v1.4.2
        if: (github.ref == 'refs/heads/main' && github.repository == 'alibaba/neug') || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && github.repository == 'alibaba/neug')
        with:
          user: __token__
          password: ${{ secrets.PYPI_PASSWORD }}
          packages_dir: wheelhouse/
          verbose: true
          skip_existing: true # Skip existing wheels to avoid errors if the same wheel is already published, to update the wheel for a specific version, add -{number} to the filename and
          # update it manually

      - name: Clean all installed python packages
        run: |
          python3 -m pip freeze | xargs python3 -m pip uninstall -y || true
    
      - name: Run simple and complex tests
        env:
          TMP_DIR: ${{ github.workspace }}/${{ github.run_id }}
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip uninstall -y neug || echo "Uninstalled neug if it was installed"
          for i in $(ls wheelhouse/*.whl); do
            python3 -m pip install $i || echo "Failed to install $i"
          done
          rm -rf ${TMP_DIR}/test_example
          GLOG_v=10 python3 tools/python_bind/example/simple_example.py example_dataset/modern_graph ${TMP_DIR}/test_example
          python3 tools/python_bind/example/complex_test.py

      - name: Run NeuG-Cli test
        run: |
          neug-cli --help
          neug-cli --version

  build_wheels_linux_arm64:
    needs: format_check
    if: ${{ needs.format_check.result == 'success' || needs.format_check.result == 'skipped' }}
    runs-on: [self-hosted, linux, arm64]
    steps:
      - name: checkout
        id: checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Clean the tool directory for self-hosted runner
        run: |
          rm -rf /__w/_tool/Python

      - name: Setup Python 3.13
        if: runner.name != 'arm64-1'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install cibuildwheel
        run: python3 -m pip install cibuildwheel==3.4.0

      - name: Prepare for linux
        run: |
          echo "CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)" >> $GITHUB_ENV

      - name: Limit builds to CPython 3.13 on PRs
        if: github.event_name == 'pull_request'
        run: echo "CIBW_BUILD=cp313-*" >> $GITHUB_ENV

      - name: Build wheels
        run: |
          export CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)
          export BUILD_TYPE=RELEASE
          export PYBIND11_FINDPYTHON=OFF
          python3 -m cibuildwheel ./tools/python_bind --output-dir wheelhouse

      - name: Upload wheel artifacts
        if: (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')))
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-arm64-${{ github.run_id }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@v1.4.2
        if: (github.ref == 'refs/heads/main' && github.repository == 'alibaba/neug') || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && github.repository == 'alibaba/neug')
        with:
          user: __token__
          password: ${{ secrets.PYPI_PASSWORD }}
          packages_dir: wheelhouse/
          verbose: true
          skip_existing: true # Skip existing wheels to avoid errors if the same wheel is already published, to update the wheel for a specific version, add -{number} to the filename and
          # update it manually

      - name: Clean all installed python packages
        run: |
          python3 -m pip freeze | xargs python3 -m pip uninstall -y || true
    
      - name: Run simple and complex tests
        env:
          TMP_DIR: ${{ github.workspace }}/${{ github.run_id }}
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip uninstall -y neug || echo "Uninstalled neug if it was installed"
          for i in $(ls wheelhouse/*.whl); do
            python3 -m pip install $i || echo "Failed to install $i"
          done
          rm -rf ${TMP_DIR}/test_example
          GLOG_v=10 python3 tools/python_bind/example/simple_example.py example_dataset/modern_graph ${TMP_DIR}/test_example
          python3 tools/python_bind/example/complex_test.py

      - name: Run NeuG-Cli test
        run: |
          neug-cli --help
          neug-cli --version

  build_wheels_macos_x86_64:
    needs: format_check
    runs-on: macos-15-intel
    if: false
    steps:
      - name: checkout
        id: checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Cache cibuildwheel downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/cibuildwheel
          key: ${{ runner.os }}-${{ runner.arch }}-cibw-cache-v1

      - name: Pre-download virtualenv.pyz (retry on 429)
        run: |
          set -euo pipefail
          mkdir -p ~/Library/Caches/cibuildwheel
          VENV_PYZ=~/Library/Caches/cibuildwheel/virtualenv-20.32.0.pyz
          if [ -s "$VENV_PYZ" ]; then
            echo "Using cached virtualenv.pyz: $VENV_PYZ"
            exit 0
          fi
          URL_PRIMARY="https://raw.githubusercontent.com/pypa/get-virtualenv/20.32.0/public/virtualenv.pyz"
          URL_FALLBACK="https://github.com/pypa/get-virtualenv/blob/20.32.0/public/virtualenv.pyz?raw=true"
          curl -fL --retry 8 --retry-all-errors --retry-delay 3 --retry-max-time 300 -o "$VENV_PYZ" "$URL_PRIMARY" || \
          curl -fL --retry 8 --retry-all-errors --retry-delay 3 --retry-max-time 300 -o "$VENV_PYZ" "$URL_FALLBACK"
          test -s "$VENV_PYZ"

      # Only run install_dep.sh on macos system
      - name: Install dependencies
        run: |
          bash scripts/install_deps.sh

      - name: Install cibuildwheel
        run: python3 -m pip install cibuildwheel==3.4.0

      - name: Prepare for macos
        run: |
          echo "MACOSX_DEPLOYMENT_TARGET=10.15" >> $GITHUB_ENV
          echo "MACOSX_DEPLOYMENT_TARGET=10.15"
          source ~/.neug_env
          echo "CMAKE_BUILD_PARALLEL_LEVEL=$(sysctl -n hw.ncpu)" >> $GITHUB_ENV

      - name: Limit builds to CPython 3.14 on PRs
        if: github.event_name == 'pull_request'
        run: echo "CIBW_BUILD=cp314-*" >> $GITHUB_ENV

      - name: Build wheels
        run: |
          source ~/.neug_env
          export CMAKE_BUILD_PARALLEL_LEVEL=$(sysctl -n hw.ncpu)
          export BUILD_TYPE=RELEASE
          export PYBIND11_FINDPYTHON=OFF
          python3 -m cibuildwheel ./tools/python_bind --output-dir wheelhouse

      - name: Upload wheel artifacts
        if: (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')))
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-x86_64-${{ github.run_id }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@v1.4.2
        if: (github.ref == 'refs/heads/main' && github.repository == 'alibaba/neug') || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && github.repository == 'alibaba/neug')
        with:
          user: __token__
          password: ${{ secrets.PYPI_PASSWORD }}
          packages_dir: wheelhouse/
          verbose: true
          skip_existing: true # Skip existing wheels to avoid errors if the same wheel is already published, to update the wheel for a specific version, add -{number} to the filename and
          # update it manually

      - name: Clean all installed python packages
        run: |
          python3 -m pip freeze | xargs python3 -m pip uninstall -y || true
    
      - name: Run simple test
        env:
          TMP_DIR: ${{ github.workspace }}/${{ github.run_id }}
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip uninstall -y neug || echo "Uninstalled neug if it was installed"
          for i in $(ls wheelhouse/*.whl); do
            python3 -m pip install $i || echo "Failed to install $i"
          done
          rm -rf ${TMP_DIR}/test_example
          GLOG_v=10 python3 tools/python_bind/example/simple_example.py example_dataset/modern_graph ${TMP_DIR}/test_example

      - name: Run NeuG-Cli test
        run: |
          neug-cli --help
          neug-cli --version

  build_wheels_macos_aarch64:
    needs: format_check
    runs-on: macos-15
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: checkout
        id: checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Cache cibuildwheel downloads
        uses: actions/cache@v4
        with:
