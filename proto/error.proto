syntax = "proto3";

package neug.interactive;

option java_package = "com.alibaba.graphscope.interactive.proto";
option java_multiple_files = true;

// component-05: GraphScope Interactive (neug)
enum Code {
  // Not an error; returned on success.
  OK = 0;

  // Permission denied, e.g., trying to access a file without read permission.
  ERR_PERMISSION = 1001;
  // database version is not compatible with the data directory.
  ERR_VERSION_MISMATCHED = 1002;
  // The directory does not exist.
  ERR_DIRECTORY_NOT_EXIST = 1003;
  // The database is locked, e.g., another process is writing to the database.
  ERR_DATABASE_LOCKED = 1004;
  // Disk space is exhausted, e.g., no more space to write to the database.
  ERR_DISK_SPACE_EXHAUSTED = 1005;
  // The database file is corrupted, e.g., the data file is not in the expected
  // format.
  ERR_CORRUPTION_DETECTED = 1006;
  // The path is invalid, e.g., the path is not a valid file or directory.
  ERR_INVALID_PATH = 1007;
  // Configuration is invalid, e.g., the configuration file is not in the
  // expected format.
  ERR_CONFIG_INVALID = 1008;
  // Arguments of operations is invalid / in a wrong format.
  ERR_INVALID_ARGUMENT = 1009;
  // Required resources cannot be found.
  ERR_NOT_FOUND = 1010;
  // The operation is not supported.
  ERR_NOT_SUPPORTED = 1011;
  // Internal error, e.g., an unexpected error occurred.
  ERR_INTERNAL_ERROR = 1012;
  // Illegal operation, e.g., trying to perform an operation that is not
  // allowed.
  ERR_ILLEGAL_OPERATION = 1013;
  // I/O error, e.g., an error occurred while reading or writing to a file.
  ERR_IO_ERROR = 1014;
  // encoding error, unsupported encoding or decoding.
  ERR_BAD_ENCODING = 1015;
  // Import file not exists.
  ERR_INVALID_FILE = 1016;
  // Extension error, e.g., an error occurred while loading an extension.
  ERR_EXTENSION = 1017;

  // Network related errors
  ERR_NETWORK = 2001;
  // Session closed, e.g., the session is closed and cannot be used anymore.
  ERR_SESSION_CLOSED = 2002;
  // Connection broken, e.g., the connection to the server is lost, or
  // connection to the database is lost(database closed).
  ERR_CONNECTION_CLOSED = 2003;
  // Pool exhausted, e.g., the connection pool is exhausted and no more
  // connections can be created.
  ERR_POOL_EXHAUSTED = 2004;
  // Service unavailable, e.g., the service is not available currently, or the
  // service is not running.
  ERR_SERVICE_UNAVAILABLE = 2005;
  // Load overflow, e.g., the service is overloaded and cannot handle more
  // requests.
  ERR_LOAD_OVERFLOW = 2006;
  // Connection error, e.g., an error in connection to the server or database.
  ERR_CONNECTION_ERROR = 2007;

  // Error during query compilation
  ERR_COMPILATION = 3000;
  // Unknow error during query execution
  ERR_QUERY_EXECUTION = 3001;
  // Error during query syntax parsing
  ERR_QUERY_SYNTAX = 3002;
  // Query execution timeout, e.g., the query takes too long to execute.
  ERR_QUERY_TIMEOUT = 3003;
  // Error during concurrent write, e.g., multiple queries trying to write to
  // the same data at the same time.
  ERR_CONCURRENT_WRITE = 3004;
  // Error during query code generation
  ERR_CODEGEN_ERROR = 3005;
  // infer empty result from the logical plan in compilation phase
  ERR_EMPTY_RESULT = 3006;
  // Not initialized, e.g., the database is not initialized or the session is not
  // initialized.
  ERR_NOT_INITIALIZED = 3007;

  // Error during transaction management
  ERR_TX_STATE_CONFLICT = 4001;
  // Error during write-ahead log (WAL) writing, e.g., the WAL file cannot be
  // written to.
  ERR_WAL_WRITE_FAIL = 4002;
  // Transaction timeout, e.g., the transaction takes too long to commit.
  ERR_TX_TIMEOUT = 4003;

  // Error during schema management
  ERR_SCHEMA_MISMATCH = 5001;
  // Error during schema validation, e.g., the schema is not valid or does not
  // match the data.
  ERR_INVALID_SCHEMA = 5002;
  // Error during type conversion, e.g., trying to convert a value to a type
  // that is not compatible.
  ERR_TYPE_CONVERSION = 5003;
  // Error during type overflow, e.g., assign -1 to uint32.
  ERR_TYPE_OVERFLOW = 5004;
  // Error when indexing, e.g., trying to access an element out of bounds.
  ERR_INDEX_ERROR = 5005;


  // Deployment related errors
  ERR_PLATFORM_ABI = 6001;
  ERR_PY_BIND_INIT = 6002;
  ERR_ARCH_MISMATCH = 6003;
  ERR_DEPLOY_DEPENDENCY = 6004;

  // Functionality not implemented yet
  ERR_NOT_IMPLEMENTED = 7001;

  ERR_UNKNOWN = 9999;
}
